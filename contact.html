<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact Us</title>
        <meta charset="UTF-8">
        <meta name="description" content="A contact page for linked Pet shop">
    </head>
    <body>
        <!--Navbar-->
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="contact.html">CONTACT</a></li>
                <li><a href="https://learncodinganywhere.com/" target="_blank"><em>The Tech Academy</em></a></li>
            </ul>
        </nav>
        <!--Header-->
        <header>
            <div>
                <h1>Contact Us!</h1>
            </div>
        </header>
        <!--Form-->
            <section>
                <div>
                    <h3>Please provide your contact information and a brief message of your inquiry.</h3>
                    <div>
                        <form>
                            <input type="text" placeholder="First Name">
                            <input type="text" placeholder="Last Name"><br>
                            <input type="email" placeholder="Email">
                            <input type="tel" placeholder="Telephone Number"><br>
                            <input type="checkbox" id="Newsletter">
                            <label for="Newsletter">Would you like to receive our monthly newsletter?</label><br>
                            <textarea placeholder="Type message here..."></textarea><br>
                            <input type="submit" value="submit">
                        </form>
                    </div>
                </div>
            </section>
        <!--Footer-->
        <footer>
            <table>
                <tr>
                    <td>
                        <p>The Pet Shop! &copy;</p>
                    </td>
                    <td>
                        <p>123 Square Ave.</p>
                        <p>Portland, OR 97204</p>
                    </td>
                    <td>
                        <p>503-234-3966</p>
                    </td>
                </tr>
            </table>
        </footer>
    </body>
</html>
